version: '3.8'

services:
  firebase-emulators:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '4000:4000'  # Emulator UI
      - '8080:8080'  # Firestore
      - '9099:9099'  # Auth
    volumes:
      - .:/app
    command: >
      sh -c "npm install -g firebase-tools &&
             firebase emulators:start --import=./emulator-data --export-on-exit=./emulator-data"
    environment:
      - FIRESTORE_EMULATOR_HOST=0.0.0.0:8080
      - FIREBASE_AUTH_EMULATOR_HOST=0.0.0.0:9099

  backend:
    image: node:20-alpine
    working_dir: /app/backend
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    command: sh -c "yarn install && yarn develop"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=strapi
      - DATABASE_USERNAME=strapi
      - DATABASE_PASSWORD=strapi_password
      - DATABASE_SSL=false
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - FIRESTORE_EMULATOR_HOST=firebase-emulators:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulators:9099
      - FIREBASE_PROJECT_ID=demo-project
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=gemini
    depends_on:
      - firebase-emulators

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "yarn install && yarn dev --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
      - VITE_FIREBASE_PROJECT_ID=demo-project
      - VITE_USE_EMULATORS=true
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_password
      POSTGRES_DB: strapi
    volumes:
      - strapi-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - default

networks:
  default:
    name: daicer-network

volumes:
  strapi-data:

