      tags:
        - Game Data (SRD)
      operationId: get-trait-by-id
      parameters:
        - name: id
          in: path
          required: true
          description: 
          schema:
            type: string
            example: darkvision
      responses:
        200:
          description: Successful response
  /api/game-data/subclasses:
    get:
      summary: Get Subclasses
      description: Get all subclasses
      tags:
        - Game Data (SRD)
      operationId: get-subclasses
      parameters:
      responses:
        200:
          description: Successful response
  /api/game-data/subclasses/{id}:
    get:
      summary: Get Subclass by ID
      description: Get a specific subclass by ID
      tags:
