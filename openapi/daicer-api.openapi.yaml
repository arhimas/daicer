        200:
          description: Successful response
  /api/game-data/proficiencies:
    get:
      summary: Get Proficiencies
      description: Get all proficiencies
      tags:
        - Game Data (SRD)
      operationId: get-proficiencies
      parameters:
      responses:
        200:
          description: Successful response
  /api/game-data/proficiencies/{id}:
    get:
      summary: Get Proficiency by ID
      description: Get a specific proficiency by ID
      tags:
        - Game Data (SRD)
      operationId: get-proficiency-by-id
      parameters:
        - name: id
          in: path
          required: true
          description: 
          schema:
            type: string
            example: longswords
      responses:
        200:
          description: Successful response
  /api/tactical/arenas:
    get:
      summary: List Arenas
      description: Get all available tactical combat arenas
      tags:
        - Tactical Combat
      operationId: list-arenas
      parameters:
      responses:
        200:
          description: Successful response
  /api/tactical/arenas/generate:
    post:
      summary: Generate Arena from World
      description: Generate tactical arena from world coordinates
      tags:
        - Tactical Combat
      operationId: generate-arena-from-world
      parameters:
      responses:
        200:
          description: Successful response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                worldSeed: 12345
                worldX: 100
                worldY: 200
                name: Forest Ambush
  /api/tactical/encounter:
    post:
      summary: Create Encounter
      description: Create a new tactical encounter in a specific arena
      tags:
        - Tactical Combat
      operationId: create-encounter
      parameters:
      responses:
        200:
          description: Successful response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
