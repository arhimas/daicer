          schema:
            type: string
            example: action-surge
      responses:
        200:
          description: Successful response
  /api/game-data/traits:
    get:
      summary: Get Traits
      description: Get all racial traits
      tags:
        - Game Data (SRD)
      operationId: get-traits
      parameters:
      responses:
        200:
          description: Successful response
  /api/game-data/traits/{id}:
    get:
      summary: Get Trait by ID
